# alacritty
# Managed by ~/Projects/dotfiles (stow package: alacritty)

[general]
# Theme vendored from https://github.com/alacritty/alacritty-theme
import = ["~/.config/alacritty/themes/gruvbox_material_medium_dark.toml"]

[window]
opacity = 1.0
padding = { x = 8, y = 8 }
dynamic_padding = true

[font]
size = 13.0
normal = { family = "JetBrainsMono Nerd Font Mono", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font Mono", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font Mono", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font Mono", style = "Bold Italic" }

# No [terminal] shell override: alacritty launches the default login shell,
# resolved by absolute path from the user database (set fish via chsh — see
# bootstrap.sh). This avoids hardcoding a non-portable path and the macOS
# GUI-launch PATH problem (launchd PATH lacks /opt/homebrew/bin).

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
